<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <style>
        *{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
.parent{
    width: 200px;
    height: 200px;
    margin: 30px auto;
    padding: 5px;
    background-color: #f200aa;
    position: relative;
}
.child{
    margin: 4px;
    background-color: chocolate;
}
.postion{
    background-color: green;
   position: absolute;
   top: 50%;
   left: 50%;
   transform: translate(-50%,-50%);
}
/*  position: relative;  this
   position: absolute;   body app */
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">1</div>
        <div class="child">2</div>
        <div class="postion">3</div>
    </div>
</body>
</html>
